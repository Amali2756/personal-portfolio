<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I am a web developer passionate about building websites.</p>
</section>

<section id="skills">
    <h2>Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="project">
        <h3>Portfolio Website</h3>
        <p>This is my personal portfolio project.</p>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <form id="contactForm">

        <input
            type="text"
            id="name"
            placeholder="Your Name"
            required
        ><br><br>

        <input
            type="email"
            id="email"
            placeholder="Your Email"
            required
        ><br><br>

        <textarea
            id="message"
            placeholder="Your Message"
            required
        ></textarea><br><br>

        <button type="submit">Send</button>

    </form>
</section>

<script src="script.js"></script>

</body>
</html>
